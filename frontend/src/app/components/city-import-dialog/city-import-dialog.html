<div *transloco="let t; prefix: 'modals'">
  <h2 mat-dialog-title>{{ t('city.title') }}</h2>

  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ t('city.cityLabel') }}</mat-label>
      <input
        matInput
        [(ngModel)]="cityName"
        placeholder="e.g. Bratislava"
        (keyup.enter)="onConfirm()" />
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">{{ t('cancel') }}</button>
    <button mat-flat-button [disabled]="!cityName.trim()" (click)="onConfirm()">
      {{ t('confirm') }}
    </button>
  </mat-dialog-actions>
</div>
