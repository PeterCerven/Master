<div *transloco="let t; prefix: 'modals'">
  <h2 mat-dialog-title>{{ t('city.title') }}</h2>

  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ t('city.cityLabel') }}</mat-label>
      <input
        matInput
        [(ngModel)]="cityName"
        placeholder="e.g. Bratislava"
        (keyup.enter)="onConfirm()" />
    </mat-form-field>

    @if (loading()) {
      <p>{{ t('loading') }}</p>
    } @else {
      <mat-form-field
        appearance="outline"
        class="full-width"
        [matTooltip]="t('tooltips.cityCountry')"
        matTooltipPosition="right">
        <mat-label>{{ t('city.countryLabel') }}</mat-label>
        <mat-select [(ngModel)]="cityCountry">
          @for (opt of countryOptions; track opt.value) {
            <mat-option [value]="opt.value">{{ t(opt.labelKey) }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field
        appearance="outline"
        class="full-width"
        [matTooltip]="t('tooltips.retainLargestComponentPercent')"
        matTooltipPosition="right">
        <mat-label>{{ t('city.retainLargestComponentPercent') }}</mat-label>
        <input
          matInput
          type="number"
          [(ngModel)]="retainLargestComponentPercent"
          min="0"
          max="100"
          step="0.01" />
      </mat-form-field>

      <mat-form-field
        appearance="outline"
        class="full-width"
        [matTooltip]="t('tooltips.cityBoundaryBufferMeters')"
        matTooltipPosition="right">
        <mat-label>{{ t('city.cityBoundaryBufferMeters') }}</mat-label>
        <input
          matInput
          type="number"
          [(ngModel)]="cityBoundaryBufferMeters"
          min="0"
          step="10" />
      </mat-form-field>
    }
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">{{ t('cancel') }}</button>
    <button
      mat-flat-button
      [disabled]="!cityName.trim() || loading() || saving()"
      (click)="onConfirm()">
      {{ saving() ? t('saving') : t('confirm') }}
    </button>
  </mat-dialog-actions>
</div>
