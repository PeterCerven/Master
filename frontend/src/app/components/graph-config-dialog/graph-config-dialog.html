<h2 mat-dialog-title>Graph Configuration</h2>

<mat-dialog-content>
  @if (loading()) {
    <p>Loading...</p>
  } @else {
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Max Speed (km/h)</mat-label>
      <input matInput type="number" [(ngModel)]="maxSpeedKmh" min="1" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>H3 Dedup Resolution (0–15)</mat-label>
      <input matInput type="number" [(ngModel)]="h3DedupResolution" min="0" max="15" />
    </mat-form-field>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="onOk()" [disabled]="loading() || saving()">
    {{ saving() ? 'Saving...' : 'OK' }}
  </button>
</mat-dialog-actions>
