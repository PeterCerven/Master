<div *transloco="let t; prefix: 'modals'">
  <h2 mat-dialog-title>{{ t('create.title') }}</h2>

  <mat-dialog-content>
    @if (loading()) {
      <p>t('loading')</p>
    } @else {
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ t('create.maxSpeedKmh') }}</mat-label>
        <input matInput type="number" [(ngModel)]="maxSpeedKmh" min="1"/>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ t('create.h3DedupResolution') }}</mat-label>
        <input matInput type="number" [(ngModel)]="h3DedupResolution" min="0" max="15"/>
      </mat-form-field>

      <div style="display: flex; align-items: center; gap: 12px; margin-top: 8px;">
        <input #hiddenFileInput type="file" accept=".gpx,.json,.geojson" hidden (change)="onFileChange($event)"/>
        <button mat-stroked-button type="button" (click)="hiddenFileInput.click()">
          {{ t('create.chooseFile') }}
        </button>
        <span style="font-size: 0.875rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
          {{ selectedFile ? selectedFile.name : t('create.noFileChosen') }}
        </span>
      </div>
    }
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">{{ t('cancel') }}</button>
    <button mat-flat-button color="primary" (click)="onOk()" [disabled]="loading() || saving() || !selectedFile">
      {{ saving() ? t('saving') : t('confirm') }}
    </button>
  </mat-dialog-actions>
</div>
