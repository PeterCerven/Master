<div *transloco="let t; prefix: 'modals'">
  <h2 mat-dialog-title>{{ t('place.title') }}</h2>
  <mat-dialog-content>
    @if (loading()) {
      <p>{{ t('loading') }}</p>
    } @else {
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Strategy</mat-label>
        <mat-select [(ngModel)]="strategy">
          @for (s of strategies; track s.value) {
            <mat-option [value]="s.value">{{ s.label }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ t('kDominatingSet') }}</mat-label>
        <input matInput type="number" [(ngModel)]="k" min="1"/>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ t('maxRadiusMeters') }}</mat-label>
        <input matInput type="number" [(ngModel)]="maxRadiusMeters" min="100" step="100"/>
      </mat-form-field>

      @if (strategy === 'RANDOM_STRATEGY') {
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ t('iterations') }}</mat-label>
          <input matInput type="number" [(ngModel)]="iterations" min="1"/>
        </mat-form-field>
      }
    }
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">{{ t('cancel') }}</button>
    <button mat-flat-button color="primary" (click)="onOk()" [disabled]="loading() || saving()">
      {{ saving() ? t('saving') : t('confirm') }}
    </button>
  </mat-dialog-actions>
</div>
