<div class="map-page-container" *transloco="let t; prefix: 'map'">
  <div class="map-container elevation-level3">
    @if (mapVisible()) {
      <google-map
        #googleMap
        height="100%"
        width="100%"
        [options]="options()">
      </google-map>
    }
  </div>

  <div class="control-panel">
    <button
      matFab extended
      class="control-btn load-graph-file-btn"
      [disabled]="loading"
      (click)="openGraphConfigDialog()">
      {{ loading ? t('loading') : t('createGraphFromFile') }}
    </button>
    <input hidden (change)="importGraphFromFile($event); fileInput.value = ''" #fileInput type="file"
           accept=".gpx,.json,.geojson">

    <button
      matFab extended
      class="control-btn load-graph-database-btn"
      [disabled]="loading"
      (click)="importGraphFromDatabase()">
      {{ loading ? t('loading') : t('loadGraphFromDatabase') }}
    </button>

    <button
      matFab extended
      class="control-btn save-graph-btn"
      [disabled]="saving || !graphData"
      (click)="saveCurrentGraph()">
      {{ saving ? t('saving') : t('saveGraph') }}
    </button>

    <button
      matFab extended
      class="control-btn compute-placement-btn"
      [disabled]="computingPlacement || !graphData"
      (click)="computePlacement()">
      {{ computingPlacement ? t('placing') : t('computePlacement') }}
    </button>

    <button
      matFab extended
      class="control-btn clear-graph-btn"
      [disabled]="!graphData"
      (click)="clearAll()">
      {{ t('clearGraph') }}
    </button>
  </div>
</div>
