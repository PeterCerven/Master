<div class="map-page-container">
  <div class="map-container elevation-level3">
    @if (mapVisible()) {
      <google-map
        #googleMap
        height="100%"
        width="100%"
        [options]="options()">
      </google-map>
    }
  </div>

  <div class="control-panel">
    <button
      matFab extended
      class="control-btn load-graph-file-btn"
      [disabled]="loading"
      (click)="openGraphConfigDialog()">
      {{ loading ? 'Loading Graph...' : 'Load Graph from File' }}
    </button>
    <input hidden (change)="importGraphFromFile($event); fileInput.value = ''" #fileInput type="file" accept=".gpx,.json,.geojson">

    <button
      matFab extended
      class="control-btn load-graph-database-btn"
      [disabled]="loading"
      (click)="importGraphFromDatabase()">
      {{ loading ? 'Loading Graph...' : 'Load Graph from Database' }}
    </button>

    <button
      matFab extended
      class="control-btn save-graph-btn"
      [disabled]="saving || !graphData"
      (click)="saveCurrentGraph()">
      {{ saving ? 'Saving...' : 'Save Graph' }}
    </button>

    <button
      matFab extended
      class="control-btn compute-placement-btn"
      [disabled]="computingPlacement || !graphData"
      (click)="computePlacement()">
      {{ computingPlacement ? 'Computing...' : 'Compute Placement' }}
    </button>

    <button
      matFab extended
      class="control-btn clear-graph-btn"
      [disabled]="!graphData"
      (click)="clearAll()">
      Clear All
    </button>
  </div>
</div>
